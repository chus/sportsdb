name: Marketing AI Agent

on:
  schedule:
    # Full pipeline: every Sunday at 8:00 UTC
    - cron: '0 8 * * 0'
    # Social distribution: daily at 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      layers:
        description: 'Layers to run (comma-separated: analyze,generate,distribute,track)'
        required: false
        default: 'all'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run full pipeline (Sunday)
        if: github.event.schedule == '0 8 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.layers == 'all')
        run: npx tsx scripts/agents/run-agent.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run social distribution (daily)
        if: github.event.schedule == '0 10 * * *'
        run: npx tsx scripts/agents/run-agent.ts --only=distribute
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run specific layers (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.layers != 'all'
        run: npx tsx scripts/agents/run-agent.ts --only=${{ github.event.inputs.layers }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
