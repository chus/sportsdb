name: Daily Article Generation

on:
  schedule:
    # Runs at 6am UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Article type to generate'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - match_report
          - match_preview
          - round_recap
          - player_spotlight
          - season_review
      limit:
        description: 'Max articles to generate per type'
        required: false
        default: '10'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TYPE="${{ github.event.inputs.type || 'all' }}"
          LIMIT="${{ github.event.inputs.limit || '10' }}"

          if [ "$TYPE" = "all" ]; then
            npx tsx scripts/generate-articles.ts --limit=$LIMIT
          else
            npx tsx scripts/generate-articles.ts --type=$TYPE --limit=$LIMIT
          fi

      - name: Log completion
        run: echo "Article generation completed at $(date)"
