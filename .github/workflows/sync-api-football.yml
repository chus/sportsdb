name: API-Football Sync

on:
  schedule:
    # Daily 6am UTC full enrichment of every league. The round-robin
    # one-league-per-day mode existed for the 100 req/day free tier;
    # the Pro plan (7,500 req/day) covers all 11 leagues in one run.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'enrich-all'
        type: choice
        options:
          - enrich-next
          - enrich-all
          - standings
          - full
          - player-stats
          - match-details
          - match-stats
          - player-match-stats
          - full-data
          - restore

      slug:
        description: 'League slug (for full/enrich single league)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine enrichment target
        id: target
        run: |
          MODE="${{ github.event.inputs.mode || 'enrich-all' }}"
          SLUG="${{ github.event.inputs.slug || '' }}"

          if [ "$MODE" = "enrich-next" ]; then
            # Round-robin: pick league based on day of year
            LEAGUES=("premier-league" "la-liga" "bundesliga" "serie-a" "ligue-1" "eredivisie" "primeira-liga" "liga-profesional-argentina" "liga-mx" "mls" "brasileirao-serie-a")
            DAY_OF_YEAR=$(date +%-j)
            INDEX=$((10#$DAY_OF_YEAR % ${#LEAGUES[@]}))
            SLUG="${LEAGUES[$INDEX]}"
            echo "mode=enrich" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "Selected league for today: $SLUG (day $DAY_OF_YEAR, index $INDEX)"
          elif [ "$MODE" = "enrich-all" ]; then
            echo "mode=enrich-all" >> $GITHUB_OUTPUT
            echo "slug=" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "standings" ]; then
            echo "mode=standings" >> $GITHUB_OUTPUT
            echo "slug=" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "full" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "player-stats" ] || [ "$MODE" = "match-details" ] || [ "$MODE" = "match-stats" ] || [ "$MODE" = "player-match-stats" ] || [ "$MODE" = "full-data" ] || [ "$MODE" = "restore" ]; then
            echo "mode=$MODE" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          fi

      - name: Sync standings (LATAM)
        if: steps.target.outputs.mode == 'standings'
        run: npx tsx scripts/sync-api-football.ts --standings

      - name: Full sync league
        if: steps.target.outputs.mode == 'full' && steps.target.outputs.slug != ''
        run: npx tsx scripts/sync-api-football.ts --full --slug=${{ steps.target.outputs.slug }}

      - name: Enrich single league
        if: steps.target.outputs.mode == 'enrich'
        run: npx tsx scripts/sync-api-football.ts --enrich --slug=${{ steps.target.outputs.slug }}

      - name: Enrich all European leagues
        if: steps.target.outputs.mode == 'enrich-all'
        run: |
          for LEAGUE in premier-league la-liga bundesliga serie-a ligue-1 eredivisie primeira-liga; do
            echo "--- Enriching $LEAGUE ---"
            npx tsx scripts/sync-api-football.ts --enrich --slug=$LEAGUE || true
          done

      # Refresh standings from API-Football (primary) every day. fd's
      # fetch-standings cron used to own this but rolls to the next season
      # early and zeroed our tables; af returns the correct season and the
      # sync now drops stale rows. Cheap (~11 requests).
      - name: Refresh all standings
        if: steps.target.outputs.mode == 'enrich-all'
        run: npx tsx scripts/sync-api-football.ts --all-standings || true

      - name: Full player season stats
        if: steps.target.outputs.mode == 'player-stats'
        run: npx tsx scripts/sync-api-football.ts --player-stats ${{ steps.target.outputs.slug && format('--slug={0}', steps.target.outputs.slug) || '' }}

      - name: Match details (lineups + events)
        if: steps.target.outputs.mode == 'match-details'
        run: npx tsx scripts/sync-api-football.ts --match-details ${{ steps.target.outputs.slug && format('--slug={0}', steps.target.outputs.slug) || '' }}

      - name: Match statistics (possession, shots, passes, xG)
        if: steps.target.outputs.mode == 'match-stats'
        run: npx tsx scripts/sync-api-football.ts --match-stats ${{ steps.target.outputs.slug && format('--slug={0}', steps.target.outputs.slug) || '' }}

      - name: Player match stats (per-player ratings + stat lines)
        if: steps.target.outputs.mode == 'player-match-stats'
        run: npx tsx scripts/sync-api-football.ts --player-match-stats ${{ steps.target.outputs.slug && format('--slug={0}', steps.target.outputs.slug) || '' }}

      # One-shot full data pass: every league's fixtures get lineups +
      # events + team statistics + per-player stat lines, then every player
      # gets a season stat line. Run from CI on purpose — datacenter-to-Neon
      # latency makes the per-entity DB round-trips ~50x faster than a laptop.
      - name: Full data (stats + match details, all leagues)
        if: steps.target.outputs.mode == 'full-data'
        timeout-minutes: 360
        run: |
          npx tsx scripts/sync-api-football.ts --player-stats || true
          npx tsx scripts/sync-api-football.ts --match-details || true
          npx tsx scripts/sync-api-football.ts --match-stats || true
          npx tsx scripts/sync-api-football.ts --player-match-stats

      # Full disaster-recovery rebuild: restore missing club rows, then
      # full-sync every league (teams, squads, standings, fixtures via
      # API-Football), then per-player stats and per-fixture
      # lineups/events. Assumes season-rollover has set the current
      # season. Run after a wipe.
      - name: Restore all data (post-wipe rebuild)
        if: steps.target.outputs.mode == 'restore'
        timeout-minutes: 350
        run: |
          npx tsx scripts/restore-league-teams.ts || true
          for LEAGUE in premier-league la-liga bundesliga serie-a ligue-1 eredivisie primeira-liga brasileirao-serie-a liga-profesional-argentina liga-mx mls; do
            echo "--- Full sync $LEAGUE ---"
            npx tsx scripts/sync-api-football.ts --full --slug=$LEAGUE || true
          done
          npx tsx scripts/sync-api-football.ts --player-stats || true
          npx tsx scripts/sync-api-football.ts --match-details || true
          npx tsx scripts/sync-api-football.ts --match-stats || true
          npx tsx scripts/sync-api-football.ts --player-match-stats || true

      - name: Log completion
        run: echo "Sync completed at $(date). Mode=${{ steps.target.outputs.mode }} Slug=${{ steps.target.outputs.slug }}"
