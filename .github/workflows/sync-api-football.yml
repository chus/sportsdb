name: API-Football Sync

on:
  schedule:
    # Runs at 6am UTC daily — enriches one league per day (round-robin)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'enrich-next'
        type: choice
        options:
          - enrich-next
          - enrich-all
          - standings
          - full

      slug:
        description: 'League slug (for full/enrich single league)'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine enrichment target
        id: target
        run: |
          MODE="${{ github.event.inputs.mode || 'enrich-next' }}"
          SLUG="${{ github.event.inputs.slug || '' }}"

          if [ "$MODE" = "enrich-next" ]; then
            # Round-robin: pick league based on day of year
            LEAGUES=("premier-league" "la-liga" "bundesliga" "serie-a" "ligue-1" "eredivisie" "primeira-liga" "liga-profesional-argentina" "liga-mx" "mls" "brasileirao-serie-a")
            DAY_OF_YEAR=$(date +%-j)
            INDEX=$((10#$DAY_OF_YEAR % ${#LEAGUES[@]}))
            SLUG="${LEAGUES[$INDEX]}"
            echo "mode=enrich" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "Selected league for today: $SLUG (day $DAY_OF_YEAR, index $INDEX)"
          elif [ "$MODE" = "enrich-all" ]; then
            echo "mode=enrich-all" >> $GITHUB_OUTPUT
            echo "slug=" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "standings" ]; then
            echo "mode=standings" >> $GITHUB_OUTPUT
            echo "slug=" >> $GITHUB_OUTPUT
          elif [ "$MODE" = "full" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
          fi

      - name: Sync standings (LATAM)
        if: steps.target.outputs.mode == 'standings'
        run: npx tsx scripts/sync-api-football.ts --standings

      - name: Full sync league
        if: steps.target.outputs.mode == 'full' && steps.target.outputs.slug != ''
        run: npx tsx scripts/sync-api-football.ts --full --slug=${{ steps.target.outputs.slug }}

      - name: Enrich single league
        if: steps.target.outputs.mode == 'enrich'
        run: npx tsx scripts/sync-api-football.ts --enrich --slug=${{ steps.target.outputs.slug }}

      - name: Enrich all European leagues
        if: steps.target.outputs.mode == 'enrich-all'
        run: |
          for LEAGUE in premier-league la-liga bundesliga serie-a ligue-1 eredivisie primeira-liga; do
            echo "--- Enriching $LEAGUE ---"
            npx tsx scripts/sync-api-football.ts --enrich --slug=$LEAGUE || true
          done

      - name: Log completion
        run: echo "Sync completed at $(date). Mode=${{ steps.target.outputs.mode }} Slug=${{ steps.target.outputs.slug }}"
